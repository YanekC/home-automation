- name: Create directory
  ansible.builtin.file:
    path: "{{ home_path_immich }}"
    state: directory
- name: Create backup directory
  ansible.builtin.file:
    path: "{{ gros_disque_path }}/data/immich_db_backup"
    state: directory
- name: Copy docker compose file to pi
  ansible.builtin.copy:
    src: ../files/
    dest: "{{ home_path_immich }}/"
    force: true
- name: Copy env file to pi
  ansible.builtin.template:
    src: ../secrets/.env.j2
    dest: "{{ home_path_immich }}/.env"
    force: true

- name: Tear down immich services
  community.docker.docker_compose_v2:
    project_src: "{{ home_path_immich }}"
    state: absent

