- name: Create directory yanck/matter
  ansible.builtin.file:
    path: "{{ home_path_matter }}"
    state: directory

- name: Copy docker compose file
  ansible.builtin.copy:
    src: ../files/compose.yml
    dest: "{{ home_path_matter }}/compose.yml"
    force: true

- name: Tear down homepage services
  community.docker.docker_compose_v2:
    project_src: "{{ home_path_matter }}"
    state: absent

- name: Create and start homepage services
  community.docker.docker_compose_v2:
    project_src: "{{ home_path_matter }}"
    pull: always
